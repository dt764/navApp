<ion-header translucent>
  <ion-toolbar class="gradient-header">
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content" fullscreen>

  <div class="login-container">
    <h1 class="login-title">Welcome Back</h1>
    <ion-input placeholder="Email" type="email" class="login-input"></ion-input>
    <ion-input placeholder="Password" type="password" class="login-input"></ion-input>
    <ion-button class="login-button" expand="block" (click)="login()">
      Log In
    </ion-button>
  </div>

</ion-content>
